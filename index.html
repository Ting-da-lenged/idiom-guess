<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>你画我猜 - ai生成版</title>

<style>
* { box-sizing: border-box; }

body {
margin:0;
min-height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
background:#f5f7fb;
}

/* 隐藏式爱心按钮 */
.secret-heart {
position: fixed;
top: 14px;
right: 14px;
font-size: 16px;
opacity: 0.22;
cursor: pointer;
user-select: none;
transition: opacity 0.3s ease, transform 0.2s ease;
}

.secret-heart:hover {
opacity: 0.65;
transform: scale(1.1);
}

.app {
min-height:100vh;
padding:24px;
display:flex;
justify-content:center;
align-items:center;
}

.main-card {
width:100%;
max-width:1180px;
min-height:680px;
background:#fff;
border-radius:28px;
box-shadow:0 10px 32px rgba(0,0,0,0.1);
padding:28px;
display:grid;
grid-template-columns:1.45fr 0.9fr;
gap:28px;
}

.image-area {
background:#fafafa;
border:2px solid #eee;
border-radius:24px;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.image-loading {
position:absolute;
inset:0;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
gap:14px;
background:rgba(250,250,250,0.88);
z-index:2;
border-radius:22px;
font-size:22px;
font-weight:800;
color:#1677ff;
}

.image-loading.show {
display:flex;
}

.spinner {
width:46px;
height:46px;
border:5px solid #d8e4ff;
border-top-color:#1677ff;
border-radius:50%;
animation:spin 0.8s linear infinite;
}

@keyframes spin {
to { transform:rotate(360deg); }
}

.image-area img {
width:100%;
height:100%;
max-height:600px;
object-fit:contain;
border-radius:18px;
cursor:pointer;
}

.side-panel {
border-radius:24px;
background:#f7f9ff;
padding:28px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.title {
font-size:36px;
font-weight:800;
margin:0 0 12px;
}

.subtitle {
font-size:18px;
color:#666;
margin-bottom:24px;
}

.counter {
display:inline-block;
padding:8px 16px;
background:#eaf2ff;
color:#1677ff;
border-radius:999px;
font-size:18px;
font-weight:600;
margin-bottom:24px;
}

.guess-area {
margin-top:18px;
padding:24px;
border-radius:22px;
background:white;
border:2px solid #e4ecff;
}

.guess-input {
width:100%;
border:2px solid #d8e4ff;
border-radius:14px;
padding:16px;
font-size:32px;
text-align:center;
outline:none;
letter-spacing:8px;
}

.guess-input.correct {
border-color:#16a34a;
background:#ecfdf5;
}

.guess-input.wrong {
border-color:#dc2626;
background:#fef2f2;
}

.guess-input:disabled {
background:#f1f5f9;
cursor:not-allowed;
color:#94a3b8;
}

.result {
margin-top:12px;
min-height:30px;
font-size:22px;
font-weight:800;
text-align:center;
}

.result.correct { color:#16a34a; }
.result.wrong { color:#dc2626; }

.tip {
margin-top:14px;
font-size:16px;
color:#888;
text-align:center;
}

.buttons {
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:28px;
}

button {
border:none;
border-radius:16px;
padding:16px 20px;
font-size:20px;
font-weight:700;
cursor:pointer;
background:#1677ff;
color:white;
}

button:disabled {
background:#ccc;
cursor:not-allowed;
}


.browser-actions {
margin-top:16px;
}

.browse-btn {
width:100%;
background:#0f172a;
}

.image-browser-overlay {
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
padding:24px;
background:rgba(15,23,42,0.58);
z-index:10;
}

.image-browser-overlay.show {
display:flex;
}

.image-browser {
width:min(1100px,96vw);
max-height:88vh;
background:white;
border-radius:28px;
box-shadow:0 18px 48px rgba(0,0,0,0.22);
padding:24px;
display:flex;
flex-direction:column;
gap:18px;
}

.browser-header {
display:flex;
justify-content:space-between;
align-items:center;
gap:16px;
}

.browser-title {
font-size:26px;
font-weight:800;
color:#0f172a;
}

.browser-subtitle {
margin-top:4px;
font-size:14px;
color:#64748b;
}

.close-browser-btn {
background:#e2e8f0;
color:#0f172a;
padding:10px 16px;
font-size:16px;
}

.thumb-grid {
overflow:auto;
padding:4px 4px 10px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:14px;
}

.thumb-card {
position:relative;
border:2px solid #e2e8f0;
border-radius:18px;
background:#f8fafc;
padding:8px;
cursor:pointer;
transition:transform 0.15s ease,border-color 0.15s ease,box-shadow 0.15s ease;
}

.thumb-card:hover {
transform:translateY(-2px);
border-color:#93c5fd;
box-shadow:0 8px 20px rgba(15,23,42,0.12);
}

.thumb-card.active {
border-color:#1677ff;
box-shadow:0 0 0 4px rgba(22,119,255,0.12);
}

.thumb-card.locked {
opacity:0.58;
cursor:not-allowed;
}

.thumb-card.locked:hover {
transform:none;
box-shadow:none;
border-color:#e2e8f0;
}

.thumb-card.loading {
pointer-events:none;
opacity:0.7;
}

.thumb-image-wrap {
position:relative;
width:100%;
aspect-ratio:1/1;
border-radius:12px;
overflow:hidden;
background:#eef2ff;
display:flex;
justify-content:center;
align-items:center;
}

.thumb-image-wrap img {
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.thumb-placeholder {
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:13px;
font-weight:700;
color:#64748b;
background:#eef2ff;
}

.thumb-card.loaded .thumb-placeholder {
display:none;
}

.thumb-info {
margin-top:8px;
display:flex;
justify-content:space-between;
gap:8px;
align-items:center;
font-size:14px;
font-weight:700;
color:#0f172a;
}

.thumb-answer {
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.thumb-badge {
flex:none;
font-size:12px;
padding:3px 7px;
border-radius:999px;
background:#eaf2ff;
color:#1677ff;
}


.thumb-card.locked .thumb-image-wrap {
background:linear-gradient(135deg,#e2e8f0,#f8fafc);
}

.thumb-card.locked .thumb-placeholder {
background:linear-gradient(135deg,#e2e8f0,#f8fafc);
color:#475569;
}

.thumb-card.locked .thumb-answer {
color:#64748b;
}

.thumb-card.locked .thumb-badge {
background:#e2e8f0;
color:#64748b;
}

body.browser-open {
overflow:hidden;
}

@media (max-width:850px){
.main-card{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="secret-heart" onclick="showSecretImage()">♡</div>

<div class="app">
<div class="main-card">

<div class="image-area">
<img id="idiomImage" onclick="showAnswer()" />
<div id="imageLoading" class="image-loading" aria-live="polite">
<div class="spinner"></div>
<div>图片加载中...</div>
</div>
</div>

<div class="side-panel">

<div>
<h1 class="title">你画我猜</h1>
<div class="subtitle">输入4字自动检测；点击图片直接公布答案</div>

<div class="counter" id="counter"></div>

<div class="guess-area">
<input id="guessInput" class="guess-input"
placeholder="请输入4字成语"
maxlength="5"
oninput="autoCheck()" />
<div id="result" class="result"></div>
</div>

<div class="tip">提示：图片可点击公布答案</div>

<div class="browser-actions">
<button id="browseBtn" class="browse-btn" onclick="openImageBrowser()">快速浏览图片</button>
</div>

</div>

<div class="buttons">
<button id="prevBtn" onclick="prevImage()">上一张</button>
<button id="nextBtn" onclick="nextImage()">下一张</button>
</div>

</div>
</div>
</div>


<div id="imageBrowserOverlay" class="image-browser-overlay" onclick="closeImageBrowser(event)">
<div class="image-browser" onclick="event.stopPropagation()">
<div class="browser-header">
<div>
<div class="browser-title">快速浏览图片</div>
<div class="browser-subtitle">缩略图会懒加载；点击任意可用图片即可跳转</div>
</div>
<button class="close-browser-btn" onclick="closeImageBrowser()">关闭</button>
</div>
<div id="thumbGrid" class="thumb-grid"></div>
</div>
</div>

<script>

/*
第 1-21 张是默认可见题目。
特殊图片统一放在 specialImages 中管理，并永远显示在普通图片之后。
点击右上角隐藏 ♡ 或输入“13只甜潼”会进入第 1 张特殊彩蛋题。
答对“一路相伴”后，解锁全部特殊图片。
*/

const normalImages=[
"image1_百里挑一.png",
"image2_雕虫小计.png",
"image3_虎头蛇尾.png",
"image4_井上添花.png",
"image5_滥竽充数.png",
"image6_五光十色.png",
"image7_五花八门.png",
"image8_扬眉吐气.png",
"image9_鱼目混珠.png",
"image10_无懈可击.png",
"image11_机不可失.png",
"image12_一心一意.png",
"image13_口是心非.png",
"image14_顺水推舟.png",
"image15_天马行空.png",
"image16_顺理成章.png",
"image17_争先恐后.png",
"image18_左右为难.png",
"image19_大展宏图.png",
"image20_财源广进.png",
"image21_鸿运当头.png",
"image22_扶摇直上.png",
"image23_两全其美.png",
"image24_九牛一毛.png",
];

const specialImages=[
"specialImage1_一路相伴.png",
"specialImage2_光芒万丈.png",
"specialImage3_星途璀璨.png"
];

const allImages=[...normalImages,...specialImages];
const FIRST_HIDDEN_INDEX=normalImages.length;
const SECRET_CODE="13只甜潼";

let currentIndex=0;
let isUnlocked=false;
let isImageLoading=false;
let imageLoadToken=0;
let browserBuilt=false;
let thumbObserver=null;
const useThumbs=true;

function getAnswerFromFilename(filename){
const nameWithoutExt=filename.substring(0,filename.lastIndexOf("."));
return nameWithoutExt.split("_")[1];
}

function normalize(text){
return text.replace(/\s/g,"");
}

function isHiddenIndex(index){
return index>=FIRST_HIDDEN_INDEX;
}

function canShowIndex(index){
if(index<normalImages.length)return true;
if(isUnlocked)return true;
// 未正式解锁前，只允许通过隐藏入口临时查看第 1 张特殊图片。
return index===FIRST_HIDDEN_INDEX;
}

function setLoadingState(isLoading){
isImageLoading=isLoading;

const loading=document.getElementById("imageLoading");
const input=document.getElementById("guessInput");
const img=document.getElementById("idiomImage");
const browseBtn=document.getElementById("browseBtn");

loading.classList.toggle("show",isLoading);
input.disabled=isLoading;
img.style.pointerEvents=isLoading?"none":"auto";
img.style.opacity=isLoading?"0.45":"1";
browseBtn.disabled=isLoading;
setBrowserCardsDisabled(isLoading);

updateButtonState();
}

function updateButtonState(){
const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");

if(isImageLoading){
prevBtn.disabled=true;
nextBtn.disabled=true;
return;
}

prevBtn.disabled=currentIndex===0;

if(isUnlocked){
nextBtn.disabled=currentIndex===allImages.length-1;
}else{
// 未解锁时：普通题只能到第 21 张；第 1 张特殊彩蛋题不能继续下一张。
nextBtn.disabled=currentIndex>=normalImages.length-1;
}
}

function getPlayableItems(){
return allImages.map((filename,index)=>({
filename,
index,
isHidden:isHiddenIndex(index),
locked:!isUnlocked && isHiddenIndex(index),
displayNumber:index+1
}));
}

function getThumbSrc(filename){
if(!useThumbs)return "images/"+filename;
const dotIndex=filename.lastIndexOf(".");
const baseName=dotIndex>=0?filename.substring(0,dotIndex):filename;
return "thumbs/"+baseName+".webp";
}

function fallbackToOriginal(img,filename){
if(img.dataset.fallbackDone==="true")return;
img.dataset.fallbackDone="true";
img.src="images/"+filename;
}

function preloadNearbyImages(centerIndex){
const preloadIndexes=[centerIndex-1,centerIndex+1,centerIndex+2]
.filter(index=>index>=0 && index<allImages.length && canShowIndex(index));

preloadIndexes.forEach(index=>{
const preloadImg=new Image();
preloadImg.src="images/"+allImages[index];
});
}

function buildImageBrowser(){
const grid=document.getElementById("thumbGrid");
grid.innerHTML="";

const items=getPlayableItems();

if(thumbObserver){
thumbObserver.disconnect();
}

thumbObserver=new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(!entry.isIntersecting)return;
const img=entry.target;
if(img.dataset.loadedSrc)return;
img.dataset.loadedSrc="true";
img.src=img.dataset.src;
thumbObserver.unobserve(img);
});
},{root:grid,rootMargin:"180px"});

items.forEach(item=>{
const card=document.createElement("button");
card.type="button";
card.className="thumb-card";
card.dataset.filename=item.filename;
card.dataset.displayNumber=String(item.displayNumber);

if(item.locked)card.classList.add("locked");
if(item.index===currentIndex)card.classList.add("active");

card.innerHTML=`
<div class="thumb-image-wrap">
<div class="thumb-placeholder">${item.locked?"隐藏图片":"加载缩略图"}</div>
${item.locked?"":`<img alt="第 ${item.displayNumber} 张" loading="lazy" decoding="async" data-src="${getThumbSrc(item.filename)}" />`}
</div>
<div class="thumb-info">
<span class="thumb-answer">${item.locked?"隐藏图片":getAnswerFromFilename(item.filename)}</span>
<span class="thumb-badge">${item.displayNumber}</span>
</div>
`;

const img=card.querySelector("img");
if(img){
img.onload=()=>card.classList.add("loaded");
img.onerror=()=>fallbackToOriginal(img,item.filename);
thumbObserver.observe(img);
}

card.disabled=item.locked;
card.onclick=()=>selectBrowserImage(item);
grid.appendChild(card);
});

browserBuilt=true;
}

function refreshImageBrowser(){
if(!browserBuilt)return;
buildImageBrowser();
}

function setBrowserCardsDisabled(disabled){
const cards=document.querySelectorAll(".thumb-card");
cards.forEach(card=>{
card.disabled=disabled || card.classList.contains("locked");
card.classList.toggle("loading",disabled);
});
}

function openImageBrowser(){
if(isImageLoading)return;
buildImageBrowser();
document.getElementById("imageBrowserOverlay").classList.add("show");
document.body.classList.add("browser-open");
}

function closeImageBrowser(event){
if(event && event.target.id!=="imageBrowserOverlay")return;
document.getElementById("imageBrowserOverlay").classList.remove("show");
document.body.classList.remove("browser-open");
}

function selectBrowserImage(item){
if(isImageLoading || item.locked)return;
closeImageBrowser();
currentIndex=item.index;
updatePage();
}

function loadImage(filename){
const img=document.getElementById("idiomImage");
const token=++imageLoadToken;

setLoadingState(true);

img.onload=function(){
if(token!==imageLoadToken)return;
setLoadingState(false);
preloadNearbyImages(currentIndex);
refreshImageBrowser();
};

img.onerror=function(){
if(token!==imageLoadToken)return;
setLoadingState(false);
document.getElementById("result").textContent="图片加载失败，请刷新页面重试";
document.getElementById("result").className="result wrong";
};

img.src="images/"+filename;
}

function resetInput(){
const input=document.getElementById("guessInput");
input.value="";
input.classList.remove("correct","wrong");
document.getElementById("result").textContent="";
document.getElementById("result").className="result";
}

function revealFirstHiddenImage(){
currentIndex=FIRST_HIDDEN_INDEX;
updatePage();
}

function autoCheck(){
if(isImageLoading)return;

const input=document.getElementById("guessInput");
const value=input.value.trim();
const normalizedValue=normalize(value);

if(normalizedValue===normalize(SECRET_CODE)){
revealFirstHiddenImage();
const result=document.getElementById("result");
result.textContent="隐藏图片入口已开启！";
result.className="result correct";
input.classList.remove("wrong");
input.classList.add("correct");
return;
}

if(value.length<4)return;

const filename=allImages[currentIndex];
const correct=getAnswerFromFilename(filename);
const result=document.getElementById("result");

if(normalizedValue===normalize(correct)){
input.classList.remove("wrong");
input.classList.add("correct");

if(currentIndex===FIRST_HIDDEN_INDEX && !isUnlocked){
unlockHiddenImages();
result.textContent="恭喜答对，特殊图片已全部解锁！";
}else{
result.textContent="答对了！";
}

result.className="result correct";
}else{
result.textContent="不对哦";
result.className="result wrong";
input.classList.remove("correct");
input.classList.add("wrong");
}
}

function unlockHiddenImages(){
if(isUnlocked)return;
isUnlocked=true;
currentIndex=FIRST_HIDDEN_INDEX;
updateCounter();
updateButtonState();
refreshImageBrowser();
}

function showAnswer(){
if(isImageLoading)return;

const filename=allImages[currentIndex];
const answer=getAnswerFromFilename(filename);

const input=document.getElementById("guessInput");
input.value=answer;
input.classList.remove("wrong");
input.classList.add("correct");

const result=document.getElementById("result");
result.textContent="正确答案";
result.className="result correct";
}

function showSecretImage(){
if(isImageLoading)return;
revealFirstHiddenImage();
}

function updateCounter(){
const totalNumber=isUnlocked?allImages.length:normalImages.length;
const displayNumber=currentIndex+1;
document.getElementById("counter").textContent=`第 ${displayNumber} 张 / 共 ${totalNumber} 张`;
}

function updatePage(){
if(!canShowIndex(currentIndex)){
currentIndex=Math.min(currentIndex,normalImages.length-1);
}

const filename=allImages[currentIndex];
loadImage(filename);
resetInput();
updateCounter();
updateButtonState();
}

function prevImage(){
if(isImageLoading)return;
if(currentIndex>0){
currentIndex--;
updatePage();
}
}

function nextImage(){
if(isImageLoading)return;
if(!isUnlocked && currentIndex>=normalImages.length-1)return;
if(currentIndex<allImages.length-1){
currentIndex++;
updatePage();
}
}

document.addEventListener("keydown",function(event){
if(event.key==="Escape")closeImageBrowser();
});

updatePage();

</script>

</body>
</html>
